<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live Shift Reconciliation | OctaneFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f1117;
      --bg-card: rgba(30, 41, 59, 0.7);
      --primary: #3b82f6;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border: rgba(255, 255, 255, 0.1);
      --glass-bg: rgba(15, 23, 42, 0.6);
      --glass-border: rgba(255, 255, 255, 0.05);
    }
    
    body {
      margin: 0;
      padding: 0;
      background: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }
    
    .navbar {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    
    .navbar h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #94a3b8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .back-btn {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .back-btn:hover { background: rgba(255,255,255,0.05); color: #fff; }
    
    .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .kpi-card {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      padding: 1.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
    }
    
    .kpi-card h3 { margin: 0 0 0.5rem 0; font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); letter-spacing: 0.5px;}
    .kpi-card .value { font-size: 2rem; font-weight: 800; margin: 0; }
    
    .val-positive { color: var(--success); }
    .val-negative { color: var(--danger); }
    .val-neutral { color: var(--text-main); }
    
    .shift-table-container {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3);
    }
    
    table { width: 100%; border-collapse: collapse; text-align: left; }
    th, td { padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); }
    th { background: rgba(0,0,0,0.2); font-size: 0.85rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;}
    td { font-size: 0.95rem; font-weight: 500; }
    
    tr:last-child td { border-bottom: none; }
    tr:hover { background: rgba(255,255,255,0.02); }
    
    .badge {
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.5px;
    }
    .badge-short { background: rgba(239, 68, 68, 0.15); color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-excess { background: rgba(245, 158, 11, 0.15); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-perfect { background: rgba(16, 185, 129, 0.15); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
    
    .currency { font-family: monospace; font-size: 1.05rem; }
    
  </style>
</head>
<body>

  <nav class="navbar">
    <h1>
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--primary);"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
      Live Shift Reconciliation
    </h1>
    <a href="index.html" class="back-btn">← Back to Dashboard</a>
  </nav>

  <div class="container">
    
    <div class="kpi-grid">
      <div class="kpi-card">
        <h3>Total Fuel Revenue (30 Days)</h3>
        <p class="value val-neutral" id="kpi-revenue">₹0.00</p>
      </div>
      <div class="kpi-card">
        <h3>Actual Collections</h3>
        <p class="value val-neutral" id="kpi-collections">₹0.00</p>
      </div>
      <div class="kpi-card">
        <h3>Net Cash Variance</h3>
        <p class="value" id="kpi-variance">₹0.00</p>
      </div>
    </div>

    <div class="shift-table-container">
      <table id="recon-table">
        <thead>
          <tr>
            <th>Date</th>
            <th>Calculated Revenue</th>
            <th>Actual Collection</th>
            <th>Variance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="recon-tbody">
          <!-- Populated by JS -->
        </tbody>
      </table>
    </div>
    
  </div>

  <script src="dsr_data_certified.js?v=2"></script>
  <script>
    // Formatting util
    const formatCurrency = (num) => new Intl.NumberFormat('en-IN', { style: 'currency', currency: 'INR' }).format(num);

    function initReconciliation() {
      const ledger = (typeof DSR_DRAFT_DATA !== 'undefined' && DSR_DRAFT_DATA.daily_ledger) ? DSR_DRAFT_DATA.daily_ledger : [];
      
      // Sort descending
      const sorted = [...ledger].sort((a,b) => b.date.localeCompare(a.date));
      
      let totalRev = 0;
      let totalCol = 0;
      let totalVar = 0;
      
      const tbody = document.getElementById('recon-tbody');
      let html = '';
      
      sorted.forEach(row => {
        if (!row.prices) return; // Skip if no prices
        
        let dailyLiters = 0;
        let dailyRevenue = 0;
        
        // Calculate Revenue from totalizers
        const calculateSales = (nozzle, type) => {
          if(!row[nozzle]) return 0;
          const closeDay = row[nozzle].close_day || 0;
          const closeNight = row[nozzle].close_night || 0;
          const open = row[nozzle].open || 0;
          const maxClose = Math.max(closeDay, closeNight);
          
          if(maxClose > open) {
            const tests = (row[nozzle].tests_day || 0) + (row[nozzle].tests_night || 0);
            const sold = (maxClose - open) - tests;
            const price = row.prices[type];
            return sold * price;
          }
          return 0;
        };
        
        dailyRevenue += calculateSales('du1_p', 'petrol');
        dailyRevenue += calculateSales('du2_p', 'petrol');
        dailyRevenue += calculateSales('du1_d', 'diesel');
        dailyRevenue += calculateSales('du2_d', 'diesel');
        
        // Use actual_collection if available, otherwise just use standard sum
        let actualCollection = 0;
        if (row.actual_collection) {
            actualCollection = row.actual_collection.total;
        } else if (row.recon) {
            actualCollection = row.recon.cash_deposited + (row.recon.closing_upi - row.recon.opening_upi);
        } else {
            // Assume 0 if no manual collections logged yet
            actualCollection = 0;
        }
        
        if (actualCollection === 0) return; // Skip days with no logged collections in the new system
        
        const variance = actualCollection - dailyRevenue;
        
        totalRev += dailyRevenue;
        totalCol += actualCollection;
        totalVar += variance;
        
        let badge = `<span class="badge badge-perfect">PERFECT</span>`;
        let varClass = 'val-neutral';
        
        if (variance < -50) {
            badge = `<span class="badge badge-short">CASH SHORT</span>`;
            varClass = 'val-negative';
        } else if (variance > 50) {
            badge = `<span class="badge badge-excess">EXCESS</span>`;
            varClass = 'val-positive';
        }
        
        html += `
          <tr>
            <td>${row.date}</td>
            <td class="currency">${formatCurrency(dailyRevenue)}</td>
            <td class="currency">${formatCurrency(actualCollection)}</td>
            <td class="currency ${varClass}">${formatCurrency(variance)}</td>
            <td>${badge}</td>
          </tr>
        `;
      });
      
      tbody.innerHTML = html;
      
      document.getElementById('kpi-revenue').textContent = formatCurrency(totalRev);
      document.getElementById('kpi-collections').textContent = formatCurrency(totalCol);
      
      const vEl = document.getElementById('kpi-variance');
      vEl.textContent = formatCurrency(totalVar);
      if (totalVar < 0) vEl.className = 'value val-negative';
      else if (totalVar > 0) vEl.className = 'value val-positive';
    }
    
    document.addEventListener('DOMContentLoaded', initReconciliation);
  </script>
</body>
</html>
