name: OctaneFlow CI/CD Pipeline

on:
  push:
    branches:
      - main
      - AG2KC
  pull_request:
    branches:
      - main
      - AG2KC

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Jest Tests
        run: npm test
